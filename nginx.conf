upstream nextjs {
    server 72.62.125.152:2026;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;          # ← Tambah IPv6
    server_name m-health.id www.m-health.id;
    return 301 https://$host$request_uri;  # Redirect ke HTTPS
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;     # ← IPv6 untuk HTTPS
    server_name m-health.id www.m-health.id;

    # SSL Certificate (Let's Encrypt / Certbot)
    ssl_certificate /etc/letsencrypt/live/m-health.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/m-health.id/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Buffer settings (pertahankan punyamu)
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    large_client_header_buffers 4 32k;
    client_max_body_size 50M;

    # ✅ Static files - serve LANGSUNG dari filesystem, bypass Node.js
    location /_next/static/ {
        alias /var/www/m-health/.next/static/;  # ← Sesuaikan path Docker volume
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        
        # Fallback ke upstream jika file tidak ada di filesystem
        try_files $uri @nextjs_upstream;
    }

    # Static public folder
    location /public/ {
        alias /var/www/m-health/public/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # ✅ Favicon & robots - serve langsung
    location ~* ^/(favicon\.ico|robots\.txt|sitemap\.xml)$ {
        alias /var/www/m-health/public/;
        try_files $uri @nextjs_upstream;
        expires 30d;
    }

    # ✅ Upstream fallback
    location @nextjs_upstream {
        proxy_pass http://nextjs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location / {
        proxy_pass http://nextjs;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # ✅ Untuk HTML pages - no cache agar chunk terbaru selalu dimuat
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        
        proxy_buffering on;
        proxy_set_header Connection "";
    }
}